<div class="modal fade" id="popup_create_open" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-folder2-open me-2"></i>Open Tournament</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label" style="color: var(--text-secondary); font-size:12px;">Existing tournaments:</label>
                    <div class="table-responsive" style="max-height: 200px; overflow-y: auto;">
                        <table class="table table-hover table-sm mb-0">
                            <tbody id="table_rows_files">
                            </tbody>
                        </table>
                    </div>
                </div>
                <div>
                    <label class="form-label" style="color: var(--text-secondary); font-size:12px;">Tournament name:</label>
                    <input class="form-control form-control-sm" type="text" id="turnament_file" placeholder="e.g. chess_tournament_2026">
                    <div class="form-text" style="color: var(--text-muted);">Enter a new name or select an existing one from the list above</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary btn-sm" onclick="app.setFile()" data-bs-dismiss="modal">Open</button>
            </div>
        </div>
    </div>
</div>
