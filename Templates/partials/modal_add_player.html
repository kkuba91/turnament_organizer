<div class="modal fade" id="popup_add_player" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-person-plus me-2"></i>Add Player</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label" style="color: var(--text-secondary); font-size:12px;">Name</label>
                        <input id="add_p_name" type="text" class="form-control form-control-sm" placeholder="e.g. Garry">
                    </div>
                    <div class="col-6">
                        <label class="form-label" style="color: var(--text-secondary); font-size:12px;">Surname</label>
                        <input id="add_p_surname" type="text" class="form-control form-control-sm" placeholder="e.g. Kasparov">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label" style="color: var(--text-secondary); font-size:12px;">Gender</label>
                    <div class="btn-group btn-group-sm" role="group">
                        <input id="add_p_sex_male" type="radio" class="btn-check" name="sex_radio" autocomplete="off" checked>
                        <label class="btn btn-outline-secondary" for="add_p_sex_male"><i class="bi bi-gender-male"></i> Male</label>
                        <input id="add_p_sex_female" type="radio" class="btn-check" name="sex_radio" autocomplete="off">
                        <label class="btn btn-outline-secondary" for="add_p_sex_female"><i class="bi bi-gender-female"></i> Female</label>
                    </div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label" style="color: var(--text-secondary); font-size:12px;">Category</label>
                        <select id="add_p_category" class="form-select form-select-sm">
                            <option value="wc" selected>No category</option>
                            <option value="V">V</option>
                            <option value="V+">V+</option>
                            <option value="IV">IV</option>
                            <option value="IV+">IV+</option>
                            <option value="III">III</option>
                            <option value="III+">III+</option>
                            <option value="II">II</option>
                            <option value="II+">II+</option>
                            <option value="II++">II++</option>
                            <option value="I">I</option>
                            <option value="I+">I+</option>
                            <option value="I++">I++</option>
                            <option value="CM">CM</option>
                            <option value="CM+">CM+</option>
                            <option value="CM++">CM++</option>
                            <option value="FM">FM</option>
                            <option value="IM">IM</option>
                            <option value="GM">GM</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label" style="color: var(--text-secondary); font-size:12px;">Elo Rating</label>
                        <input id="add_p_elo" type="number" class="form-control form-control-sm" placeholder="1000" min="1000" max="3999">
                    </div>
                </div>
                <div class="mb-0">
                    <label class="form-label" style="color: var(--text-secondary); font-size:12px;">City</label>
                    <input id="add_p_city" type="text" class="form-control form-control-sm" placeholder="e.g. London">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary btn-sm" onclick="app.addPlayer()" data-bs-dismiss="modal">Add</button>
            </div>
        </div>
    </div>
</div>
